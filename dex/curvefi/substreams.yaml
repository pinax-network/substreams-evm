specVersion: v0.1.0
package:
  name: curvefi
  version: v0.6.0
  url: https://github.com/pinax-network/substreams-evm
  description: CurveFi Pool Events
  image: ../../image.png

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/curvefi.wasm

protobuf:
  files:
    - curvefi.proto
  importPaths:
    - ../../proto/v1/dex

modules:
  - name: map_events
    kind: map
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:curvefi.v1.Events


network: tron
