specVersion: v0.1.0
package:
  name: traderjoe
  version: v0.6.0
  url: https://github.com/pinax-network/substreams-evm
  description: Trader Joe V2 (Liquidity Book) for EVM
  image: ../../image.png

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/traderjoe.wasm

protobuf:
  files:
    - traderjoe.proto
  importPaths:
    - ../../proto/v1/dex

modules:
  - name: map_events
    kind: map
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:traderjoe.v1.Events


network: mainnet
