specVersion: v0.1.0
package:
  name: evm_dex
  version: v0.6.1
  url: https://github.com/pinax-network/substreams-evm
  description: DEX swaps for JustSwap, SunSwap, and SunPump on EVM blockchain
  image: ../image.png

imports:
  # SQL Sink Substreams
  database_changes: ../spkg/substreams-database-change-v2.0.0.spkg
  sql: ../spkg/substreams-sink-sql-protodefs-v1.0.7.spkg

  # Foundational Store Substreams
  evm_dex_foundational_store: ../spkg/evm-dex-foundational-store-v0.6.0.spkg

  # Tron DEX Substreams
  sunpump: ../spkg/sunpump-v0.6.0.spkg

  # Ethereum DEX Substreams
  balancer: ../spkg/balancer-v0.6.0.spkg
  bancor: ../spkg/bancor-v0.6.0.spkg
  cow: ../spkg/cow-v0.6.0.spkg

  # New DEX Substreams
  aerodrome: ../spkg/aerodrome-v0.6.0.spkg
  dodo: ../spkg/dodo-v0.6.0.spkg
  woofi: ../spkg/woofi-v0.6.0.spkg
  traderjoe: ../spkg/traderjoe-v0.6.0.spkg
  kyber_elastic: ../spkg/kyber-elastic-v0.6.0.spkg
  curvefi: ../spkg/curvefi-v0.6.0.spkg

  # Uniswap DEX Substreams
  uniswap_v1: ../spkg/uniswap-v1-v0.6.0.spkg
  uniswap_v2: ../spkg/uniswap-v2-v0.6.0.spkg
  uniswap_v3: ../spkg/uniswap-v3-v0.6.0.spkg
  uniswap_v4: ../spkg/uniswap-v4-v0.6.0.spkg

binaries:
  default:
    type: wasm/rust-v1
    file: ../target/wasm32-unknown-unknown/release/evm_dex.wasm

modules:
  - name: db_out
    kind: map
    inputs:
      - params: string
      - source: sf.substreams.v1.Clock
      - foundational-store: evm_dex_foundational_store@v0.6.0

      # Tron DEX
      - map: sunpump:map_events

      # Ethereum DEX
      - map: balancer:map_events
      - map: bancor:map_events
      - map: curvefi:map_events
      - map: cow:map_events

      # New DEX
      - map: aerodrome:map_events
      - map: dodo:map_events
      - map: woofi:map_events
      - map: traderjoe:map_events
      - map: kyber_elastic:map_events

      # Uniswap DEX
      - map: uniswap_v1:map_events
      - map: uniswap_v2:map_events
      - map: uniswap_v3:map_events
      - map: uniswap_v4:map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges

network: mainnet

params:
  db_out: "hex"  # Supported encodings: hex, tron_base58
