specVersion: v0.1.0
package:
  name: dex_swaps
  version: v0.8.0
  url: https://github.com/pinax-network/substreams-evm
  description: Normalized EVM DEX swaps package
  image: ../image.png

imports:
  dex_swaps_pools: ../spkg/dex-swaps-pools-v0.8.0.spkg

binaries:
  default:
    type: wasm/rust-v1
    file: ../target/wasm32-unknown-unknown/release/dex_swaps.wasm

protobuf:
  files:
    - dex-swaps.proto
  importPaths:
    - ../proto/v1/

modules:
  - name: map_events
    kind: map
    inputs:
      - source: sf.ethereum.type.v2.Block
      - store: dex_swaps_pools:store_pools
        mode: get
    output:
      type: proto:dex.swaps.v1.Events

network: mainnet
