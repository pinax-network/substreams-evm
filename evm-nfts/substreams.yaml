specVersion: v0.1.0
package:
  name: evm_nfts
  version: v0.7.2
  url: https://github.com/pinax-network/substreams-evm
  description: NFT tokens for EVM blockchains.
  image: ../image.png

imports:
  database_changes: ../spkg/substreams-database-change-v2.0.0.spkg

  erc721: ../erc721/transfers/substreams.yaml
  erc721_tokens: ../erc721/tokens/substreams.yaml
  erc1155: ../erc1155/substreams.yaml
  seaport: ../dex-nfts/seaport/substreams.yaml

binaries:
  default:
    type: wasm/rust-v1
    file: ../target/wasm32-unknown-unknown/release/evm_nfts.wasm

modules:
  - name: db_out
    kind: map
    inputs:
      - params: string
      - source: sf.substreams.v1.Clock
      - map: erc721:map_events
      - map: erc721_tokens:map_events
      - map: erc1155:map_events
      - map: seaport:map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges

network: mainnet

params:
  db_out: "hex"  # Supported encodings: hex, tron_base58
