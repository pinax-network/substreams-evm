syntax = "proto3";

package erc1155.v1;

message Events { repeated Transaction transactions = 1; }

message Transaction {
  bytes hash = 1;
  bytes from = 2;
  optional bytes to = 3;
  bytes input = 4;
  uint64 nonce = 5;
  string gas_price = 6; // uint256
  uint64 gas_limit = 7;
  uint64 gas_used = 8;
  string value = 9; // uint256
  repeated Log logs = 10;
}

// https://github.com/pinax-network/substreams-abis/blob/main/abi/evm/polymarket/CFTExchange.json
message Log {
  bytes address = 1;
  uint64 ordinal = 2;
  repeated bytes topics = 3;
  bytes data = 4;

  // Call metadata (only available on chains with DetailLevel: EXTENDED)
  optional Call call = 5;

  // Native block/log position fields
  uint32 block_index = 6;

  oneof log {
    // events
    TransferSingle transfer_single = 10;
    TransferBatch transfer_batch = 11;
    ApprovalForAll approval_for_all = 12;
    URI uri = 13;
  }
}

message Call {
  uint32 index = 1;
  uint64 begin_ordinal = 2;
  uint64 end_ordinal = 3;
  bytes caller = 4;  // sender
  bytes address = 5; // recipient
  string value = 6;  // uint256
  uint64 gas_consumed = 7;
  uint64 gas_limit = 8;
  uint32 depth = 9;
  uint32 parent_index = 10;
  CallType call_type = 11;
  bytes input = 12;
}

enum CallType {
  CALL_TYPE_UNSPECIFIED = 0;
  CALL_TYPE_CALL = 1;
  CALL_TYPE_CALLCODE = 2;
  CALL_TYPE_DELEGATE = 3;
  CALL_TYPE_STATIC = 4;
  CALL_TYPE_CREATE = 5;
}

message TransferSingle {
  bytes operator = 10; // address
  bytes from = 11; // address
  bytes to = 12; // address
  string id = 13; // uint256
  string value = 14; // uint256
}

message TransferBatch {
  bytes operator = 10; // address
  bytes from = 11; // address
  bytes to = 12; // address
  repeated string ids = 13; // uint256[]
  repeated string values = 14; // uint256[]
}

message ApprovalForAll {
  bytes account = 10; // address
  bytes operator = 11; // address
  bool approved = 12; // true/false
}

// ERC1155 Metadata
// https://github.com/OpenZeppelin/openzeppelin-contracts/blob/master/contracts/token/ERC1155/extensions/IERC1155MetadataURI.sol
message URI {
  string value = 10;
  string id = 11; // uint256
}
