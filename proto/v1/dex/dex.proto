syntax = "proto3";

package dex.v1;

// Unified container for normalized DEX swap events across all protocols
message DexSwaps {
  repeated DexSwap swaps = 1;
  repeated DexSwapFlash swaps_flash = 2;
}

// A single normalized DEX swap with a clear directional input/output pair
message DexSwap {
  // transaction --
  uint32 tx_index = 1;
  bytes tx_hash = 2;
  bytes tx_from = 3;
  optional bytes tx_to = 4;
  uint64 tx_nonce = 5;
  string tx_gas_price = 6; // uint256
  uint64 tx_gas_limit = 7;
  uint64 tx_gas_used = 8;
  string tx_value = 9; // uint256

  // call (only available on chains with DetailLevel: EXTENDED) --
  optional Call call = 10;

  // log --
  uint32 log_index = 11;
  uint32 log_block_index = 12;
  bytes log_address = 13;
  uint64 log_ordinal = 14;
  repeated bytes log_topics = 15;
  bytes log_data = 16;

  // normalized swap fields --
  string protocol = 20; // e.g. "uniswap_v2", "aerodrome"
  bytes factory = 21;   // factory contract address
  bytes pool = 22;      // pool/exchange contract address
  bytes user = 23;      // user wallet that initiated the swap
  bytes input_contract = 24;  // input token address
  string input_amount = 25;   // uint256 input token amount
  bytes output_contract = 26; // output token address
  string output_amount = 27;  // uint256 output token amount
}

// Flash/complex swap that cannot be losslessly normalized to a single input/output pair
// (e.g. UniswapV2 flash swaps where both amount0_in > 0 and amount1_in > 0)
message DexSwapFlash {
  // transaction --
  uint32 tx_index = 1;
  bytes tx_hash = 2;
  bytes tx_from = 3;
  optional bytes tx_to = 4;
  uint64 tx_nonce = 5;
  string tx_gas_price = 6; // uint256
  uint64 tx_gas_limit = 7;
  uint64 tx_gas_used = 8;
  string tx_value = 9; // uint256

  // call (only available on chains with DetailLevel: EXTENDED) --
  optional Call call = 10;

  // log --
  uint32 log_index = 11;
  uint32 log_block_index = 12;
  bytes log_address = 13;
  uint64 log_ordinal = 14;
  repeated bytes log_topics = 15;
  bytes log_data = 16;

  // raw swap data --
  string protocol = 20;
  bytes factory = 21;
  bytes pool = 22;
  bytes user = 23;
  bytes token0 = 24;
  bytes token1 = 25;
  string amount0_in = 26;  // uint256
  string amount1_in = 27;  // uint256
  string amount0_out = 28; // uint256
  string amount1_out = 29; // uint256
}

// Unified container for DEX pool initialization events across all protocols
message DexPools {
  repeated DexPool pools = 1;
}

// A single DEX pool with a generalized array-of-coins token representation
message DexPool {
  // pool address (primary identifier / store key)
  bytes address = 1;

  // pool metadata
  string protocol = 2; // e.g. "uniswap_v2", "curvefi"
  bytes factory = 3;   // factory contract that created the pool

  // generalized token array (order matches the on-chain indexing)
  // e.g. for Uniswap V2: [token0, token1]
  // for Curve: [coin0, coin1, ..., coinN]
  repeated bytes coins = 4;

  // creation context
  bytes tx_hash = 5;
  uint32 log_index = 6;
  uint64 log_ordinal = 7;
}

// Call metadata (only available on chains with DetailLevel: EXTENDED)
message Call {
  uint32 index = 1;
  uint64 begin_ordinal = 2;
  uint64 end_ordinal = 3;
  bytes caller = 4;  // sender
  bytes address = 5; // recipient
  string value = 6;  // uint256
  uint64 gas_consumed = 7;
  uint64 gas_limit = 8;
  uint32 depth = 9;
  uint32 parent_index = 10;
  CallType call_type = 11;
}

enum CallType {
  CALL_TYPE_UNSPECIFIED = 0;
  CALL_TYPE_CALL = 1;
  CALL_TYPE_CALLCODE = 2;
  CALL_TYPE_DELEGATE = 3;
  CALL_TYPE_STATIC = 4;
  CALL_TYPE_CREATE = 5;
}
