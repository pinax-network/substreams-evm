syntax = "proto3";

package dex.swaps.v1;

message Events {
  repeated Transaction transactions = 1;
}

message Transaction {
  bytes hash = 1;
  bytes from = 2;
  optional bytes to = 3;
  uint64 nonce = 4;
  string gas_price = 5;
  uint64 gas_limit = 6;
  uint64 gas_used = 7;
  string value = 8;
  repeated Swap swaps = 9;
}

enum Protocol {
  PROTOCOL_UNSPECIFIED = 0;
  PROTOCOL_AERODROME = 1;
  PROTOCOL_BALANCER = 2;
  PROTOCOL_BANCOR = 3;
  PROTOCOL_COW = 4;
  PROTOCOL_CURVEFI = 5;
  PROTOCOL_DODO = 6;
  PROTOCOL_KYBER_ELASTIC = 7;
  PROTOCOL_SUNPUMP = 8;
  PROTOCOL_TRADERJOE = 9;
  PROTOCOL_UNISWAP_V1 = 10;
  PROTOCOL_UNISWAP_V2 = 11;
  PROTOCOL_UNISWAP_V3 = 12;
  PROTOCOL_UNISWAP_V4 = 13;
  PROTOCOL_WOOFI = 14;
}

message Swap {
  Protocol protocol = 1;
  bytes factory = 2;
  bytes pool = 3;
  bytes user = 4;
  bytes input_token = 5;
  string input_amount = 6;
  bytes output_token = 7;
  string output_amount = 8;
  uint64 log_ordinal = 9;
}
