syntax = "proto3";

package contracts.v1;

message Events { repeated Transaction transactions = 1; }

message Transaction {
  bytes hash = 1;
  bytes from = 2;
  optional bytes to = 3;
  uint64 nonce = 5;
  string gas_price = 6; // uint256
  uint64 gas_limit = 7;
  uint64 gas_used = 8;
  string value = 9; // uint256
  repeated Contract contracts = 10;
}

message Contract {
  bytes address = 1;
  uint64 ordinal = 2;
  bytes from = 3;
  optional bytes to = 4;
  bytes deployer = 5;
  optional bytes factory = 6;
  bytes code = 7;
  bytes code_hash = 8;
  bytes input = 9;
  optional Call call = 10;
  optional Log log = 11;
}

message Log {
  bytes address = 1;
  uint64 ordinal = 2;
  repeated bytes topics = 3;
  bytes data = 4;

  // Call metadata (only available on chains with DetailLevel: EXTENDED)
  optional Call call = 5;

  // Native block/log position fields
  uint32 block_index = 6;
}

message Call {
  uint32 index = 1;
  uint64 begin_ordinal = 2;
  uint64 end_ordinal = 3;
  bytes caller = 4;  // sender
  bytes address = 5; // recipient
  string value = 6;  // uint256
  uint64 gas_consumed = 7;
  uint64 gas_limit = 8;
  uint32 depth = 9;
  uint32 parent_index = 10;
  CallType call_type = 11;
}

enum CallType {
  CALL_TYPE_UNSPECIFIED = 0;
  CALL_TYPE_CALL = 1;
  CALL_TYPE_CALLCODE = 2;
  CALL_TYPE_DELEGATE = 3;
  CALL_TYPE_STATIC = 4;
  CALL_TYPE_CREATE = 5;
}
