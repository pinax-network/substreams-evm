syntax = "proto3";

package evm.x402.v1;

message Events {
  repeated Transaction transactions = 1;
}

message Transaction {
  bytes hash = 1;
  bytes from = 2;
  optional bytes to = 3;
  uint32 index = 4;
  uint64 nonce = 5;
  string gas_price = 6; // uint256
  uint64 gas_limit = 7;
  uint64 gas_used = 8;
  string value = 9; // uint256
  repeated Log logs = 10;
}

message Log {
  bytes address = 1;
  uint64 ordinal = 2;
  repeated bytes topics = 3;
  bytes data = 4;

  // Call metadata (only available on chains with DetailLevel: EXTENDED)
  optional Call call = 5;

  // Native block/log position fields
  uint32 block_index = 6;

  oneof log {
    Payment payment = 10;
  }
}

// Call metadata (only available on chains with DetailLevel: EXTENDED)
message Call {
  uint32 index = 1;
  uint64 begin_ordinal = 2;
  uint64 end_ordinal = 3;
  bytes caller = 4;
  bytes address = 5;
  string value = 6; // uint256
  uint64 gas_consumed = 7;
  uint64 gas_limit = 8;
  uint32 depth = 9;
  uint32 parent_index = 10;
  CallType call_type = 11;
}

message Payment {
  bytes asset = 1;
  bytes payer = 2;
  bytes recipient = 3;
  bytes facilitator = 4;
  string amount = 5; // uint256
  bytes nonce = 6;

  TransferMethod transfer_method = 10;
  SettlementSource settlement_source = 11;
  string scheme = 12;
  optional string valid_after = 13;
  optional string valid_before = 14;

  bool facilitator_allowlist_matched = 20;
  string confidence = 21;
}

enum TransferMethod {
  TRANSFER_METHOD_UNSPECIFIED = 0;
  TRANSFER_METHOD_EIP3009 = 1;
  TRANSFER_METHOD_PERMIT2 = 2;
}

enum SettlementSource {
  SETTLEMENT_SOURCE_UNSPECIFIED = 0;
  SETTLEMENT_SOURCE_AUTHORIZATION_USED = 1;
  SETTLEMENT_SOURCE_PERMIT2_SETTLED = 2;
  SETTLEMENT_SOURCE_PERMIT2_SETTLED_WITH_PERMIT = 3;
}

enum CallType {
  CALL_TYPE_UNSPECIFIED = 0;
  CALL_TYPE_CALL = 1;
  CALL_TYPE_CALLCODE = 2;
  CALL_TYPE_DELEGATE = 3;
  CALL_TYPE_STATIC = 4;
  CALL_TYPE_CREATE = 5;
}
