syntax = "proto3";

package erc721.tokens.v1;

message Events { repeated Transaction transactions = 1; }

message Transaction {
  bytes hash = 1;
  bytes from = 2;
  optional bytes to = 3;
  bytes input = 4;
  uint64 nonce = 5;
  string gas_price = 6; // uint256
  uint64 gas_limit = 7;
  uint64 gas_used = 8;
  string value = 9; // uint256
  repeated Log logs = 10;
}

message Log {
  bytes address = 1;
  uint64 ordinal = 2;
  repeated bytes topics = 3;
  bytes data = 4;

  // Call metadata (only available on chains with DetailLevel: EXTENDED)
  optional Call call = 5;

  // Native block/log position fields
  uint32 block_index = 6;

  oneof log {
    Transfer transfer = 10;
    Approval approval = 11;
    ApprovalForAll approval_for_all = 12;

    Assign assign = 20;
    PunkTransfer punk_transfer = 21;
    PunkBought punk_bought = 22;
    PunkOffered punk_offered = 23;
    PunkBidEntered punk_bid_entered = 24;
    PunkBidWithdrawn punk_bid_withdrawn = 25;
    PunkNoLongerForSale punk_no_longer_for_sale = 26;
  }
}

message Call {
  uint32 index = 1;
  uint64 begin_ordinal = 2;
  uint64 end_ordinal = 3;
  bytes caller = 4;  // sender
  bytes address = 5; // recipient
  string value = 6;  // uint256
  uint64 gas_consumed = 7;
  uint64 gas_limit = 8;
  uint32 depth = 9;
  uint32 parent_index = 10;
  CallType call_type = 11;
  bytes input = 12;
}

enum CallType {
  CALL_TYPE_UNSPECIFIED = 0;
  CALL_TYPE_CALL = 1;
  CALL_TYPE_CALLCODE = 2;
  CALL_TYPE_DELEGATE = 3;
  CALL_TYPE_STATIC = 4;
  CALL_TYPE_CREATE = 5;
}

message Transfer {
  bytes from = 1;
  bytes to = 2;
  string token_id = 3; // uint256
}

message Approval {
  bytes owner = 1;
  bytes approved = 2;
  string token_id = 3; // uint256
}

message ApprovalForAll {
  bytes owner = 1;
  bytes operator = 2;
  bool approved = 3;
}

message Assign {
  bytes to = 1;
  string punk_index = 2; // uint256
}

message PunkTransfer {
  bytes from = 1;
  bytes to = 2;
  string punk_index = 3; // uint256
}

message PunkBought {
  string punk_index = 1; // uint256
  optional string value = 2; // uint256
  bytes from_address = 3;
  bytes to_address = 4;
}

message PunkBidEntered {
  string punk_index = 1; // uint256
  string value = 2; // uint256
  bytes from_address = 3;
}

message PunkBidWithdrawn {
  string punk_index = 1; // uint256
  string value = 2; // uint256
  bytes from_address = 3;
}

message PunkNoLongerForSale {
  string punk_index = 1; // uint256
}

message PunkOffered {
  string punk_index = 1; // uint256
  string min_value = 2; // uint256
  bytes to_address = 3;
}
